name: CI - Platzi DevSecOps Roadmap

# Cuando corre este pipeline:
# - En cada Pull Request hacia main (bloquea el merge si falla)
# - En cada push directo a main
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ---------------------------------------------------
  # JOB 1: Calidad del codigo
  # Verifica que el codigo compila y esta limpio
  # ---------------------------------------------------
  quality:
    name: TypeScript + Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      # Vite 8 requiere Node >=20.19.0 o >=22.12.0
      # Usamos Node 22 LTS para garantizar compatibilidad
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      # TypeScript -- verifica tipos sin generar archivos
      - name: Verificar TypeScript
        run: npx tsc --noEmit

      # ESLint -- detecta patrones inseguros y malas practicas
      - name: Lint
        run: npm run lint

  # ---------------------------------------------------
  # JOB 2: Build
  # Confirma que la app compila para produccion
  # ---------------------------------------------------
  build:
    name: Build produccion
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build

      - name: Subir artefacto del build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ---------------------------------------------------
  # JOB 3: Seguridad
  # Audita dependencias en busca de CVEs conocidas
  # (relacionado con el modulo DevSecOps)
  # ---------------------------------------------------
  security:
    name: Audit de dependencias
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      # npm audit falla el pipeline si encuentra vulnerabilidades
      # de nivel "high" o "critical" en las dependencias
      - name: Auditar vulnerabilidades
        run: npm audit --audit-level=high
