name: CI — Platzi DevSecOps Roadmap

# Cuándo corre este pipeline:
# - En cada Pull Request hacia main (bloquea el merge si falla)
# - En cada push directo a main
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Calidad del código
  # Verifica que el código compila y está limpio
  # ─────────────────────────────────────────────
  quality:
    name: TypeScript + Lint
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repo
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configura Node.js (mismo entorno que desarrollo)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'          # cachea node_modules para acelerar runs futuros

      # 3. Instala dependencias exactas del package-lock.json
      - name: Instalar dependencias
        run: npm ci

      # 4. TypeScript — verifica tipos sin generar archivos
      #    Si hay un error de tipo, el pipeline falla aquí
      - name: Verificar TypeScript
        run: npx tsc --noEmit

      # 5. ESLint — detecta patrones inseguros y malas prácticas
      - name: Lint
        run: npm run lint

  # ─────────────────────────────────────────────
  # JOB 2: Build
  # Confirma que la app compila para producción
  # ─────────────────────────────────────────────
  build:
    name: Build producción
    runs-on: ubuntu-latest
    needs: quality          # solo corre si el job anterior pasó

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build

      # Guarda el build como artefacto descargable en GitHub
      - name: Subir artefacto del build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 3: Seguridad
  # Audita dependencias en busca de CVEs conocidas
  # (relacionado con el módulo DevSecOps)
  # ─────────────────────────────────────────────
  security:
    name: Audit de dependencias
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      # npm audit falla el pipeline si encuentra vulnerabilidades
      # de nivel "high" o "critical" en las dependencias
      - name: Auditar vulnerabilidades
        run: npm audit --audit-level=high
