name: CI - Platzi DevSecOps Roadmap

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    name: TypeScript + Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Actualizar npm
        run: npm install -g npm@latest

      - name: Instalar dependencias
        run: npm install

      - name: Verificar TypeScript
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  build:
    name: Build produccion
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Actualizar npm
        run: npm install -g npm@latest

      - name: Instalar dependencias
        run: npm install

      - name: Build
        run: npm run build

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  security:
    name: Audit de dependencias
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Actualizar npm
        run: npm install -g npm@latest

      - name: Instalar dependencias
        run: npm install

      - name: Auditar vulnerabilidades
        run: npm audit --audit-level=high
